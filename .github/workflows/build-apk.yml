name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install npm dependencies
        working-directory: ./clearaller-vision
        run: npm install

      - name: Build Web App
        working-directory: ./clearaller-vision
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./clearaller-vision
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: ./clearaller-vision/android
        run: chmod +x gradlew

      - name: Build APK with Gradle
        working-directory: ./clearaller-vision/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: clearaller-vision/android/app/build/outputs/apk/debug/app-debug.apk
